<style>
:root {
  --navy: #0f1c3f;
  --navy2: #1a2e5a;
  --navy3: #253d72;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --green: #10b981;
  --amber: #f59e0b;
  --red: #ef4444;
  --purple: #8b5cf6;
  --bg: #f0f4fa;
  --surface: #ffffff;
  --surface2: #f8fafd;
  --border: rgba(15,28,63,0.1);
  --border2: rgba(15,28,63,0.06);
  --text: #0f1c3f;
  --text2: #4a5a7a;
  --text3: #8899bb;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── LAYOUT ── */
.shell { display: flex; min-height: 100vh; }
.sidebar {
  width: 220px; min-height: 100vh;
  background: var(--navy);
  padding: 0;
  flex-shrink: 0;
  display: flex; flex-direction: column;
}
.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.sidebar-logo .co { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
.sidebar-logo .sub { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.sidebar-logo .badge {
  display: inline-block; margin-top: 8px;
  background: var(--accent); color: #fff;
  font-size: 9px; font-weight: 700; padding: 2px 8px;
  border-radius: 20px; letter-spacing: 0.5px;
}
.nav { padding: 16px 0; flex: 1; }
.nav-label {
  font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.3);
  letter-spacing: 1.5px; padding: 8px 20px 4px; text-transform: uppercase;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px; font-size: 12px; color: rgba(255,255,255,0.55);
  cursor: pointer; transition: all 0.15s; border-left: 2px solid transparent;
}
.nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
.nav-item.active { color: #fff; border-left-color: var(--accent); background: rgba(59,130,246,0.12); }
.nav-item .ico { font-size: 15px; width: 18px; text-align: center; }
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.07);
  font-size: 10px; color: rgba(255,255,255,0.3);
