<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>드림솔 시설관리 통합 대시보드 v2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.1/chart.min.js"></script>
<style>
    :root { --navy: #0f1c3f; --accent: #3b82f6; --text1: #1a202c; --text2: #4a5568; --text3: #718096; --bg: #f4f6f9; --red: #e53e3e; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
    
    /* D-Day 카드 스타일 */
    .dday-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 28px; }
    .dday-card { background: white; border: 1px solid rgba(0,0,0,0.05); border-radius: 8px; padding: 12px; cursor: pointer; border-left: 5px solid #48bb78; }
    .dday-name { font-weight: 700; font-size: 12px; color: var(--text1); margin-bottom: 4px; }
    .dday-num { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; color: #2d3748; }
    .dday-date { font-size: 11px; color: var(--text3); }

    /* [핵심] 기한 초과 시 붉은색 스타일 */
    .dday-over { border-left: 5px solid var(--red) !important; background: #fff5f5 !important; }
    .dday-over .dday-num { color: var(--red) !important; }
    
    .dday-add-btn { background: white; border: 1px dashed #cbd5e0; border-radius: 8px; padding: 12px; text-align: center; cursor: pointer; color: #718096; font-size: 12px; }
</style>
</head>
<body>

<div id="dday-strip" class="dday-strip"></div>

<script>
// 기존 데이터/함수 유지 (생략된 부분은 그대로 두세요)

// [수정된 렌더링 함수]
function renderDday() {
    const strip = document.getElementById('dday-strip');
    strip.innerHTML = '';
    
    // 1. completed가 false인 것만 필터링 (완료된 건 숨김)
    const activeDdays = ddays.filter(d => !d.completed);
    
    activeDdays.slice(0, 5).forEach(d => {
        const diff = diffDays(d.date);
        let label = `D-${diff}`, cls = '';
        
        // 2. 기한 초과(음수) 시 붉은색 클래스 적용
        if (diff < 0) { 
            label = `기한초과 ${Math.abs(diff)}일`; 
            cls = 'dday-over'; 
        } else if (diff === 0) { label = 'D-Day'; }

        const card = document.createElement('div');
        card.className = `dday-card ${cls}`;
        card.onclick = () => navigateTo('dday');
        card.innerHTML = `
            <div class="dday-name">${d.name}</div>
            <div class="dday-num">${label}</div>
            <div class="dday-date">${d.date}</div>
        `;
        strip.appendChild(card);
    });

    const btn = document.createElement('div');
    btn.className = 'dday-add-btn';
    btn.onclick = () => showModal('dday');
    btn.textContent = '＋ 점검 추가';
    strip.appendChild(btn);
}

// 렌더링 실행
renderDday();
</script>
</body>
</html>
