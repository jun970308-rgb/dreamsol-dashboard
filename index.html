<title>드림솔 시설관리 통합 대시보드 v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --navy: #0f1c3f;
  --navy2: #1a2e5a;
  --navy3: #253d72;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --green: #10b981;
  --amber: #f59e0b;
  --red: #ef4444;
  --purple: #8b5cf6;
  --bg: #f0f4fa;
  --surface: #ffffff;
  --surface2: #f8fafd;
  --border: rgba(15,28,63,0.1);
  --border2: rgba(15,28,63,0.06);
  --text: #0f1c3f;
  --text2: #4a5a7a;
  --text3: #8899bb;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── LAYOUT ── */
.shell { display: flex; min-height: 100vh; }
.sidebar {
  width: 220px; min-height: 100vh;
  background: var(--navy);
  padding: 0;
  flex-shrink: 0;
  display: flex; flex-direction: column;
}
.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.sidebar-logo .co { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
.sidebar-logo .sub { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.sidebar-logo .badge {
  display: inline-block; margin-top: 8px;
  background: var(--accent); color: #fff;
  font-size: 9px; font-weight: 700; padding: 2px 8px;
  border-radius: 20px; letter-spacing: 0.5px;
}
.nav { padding: 16px 0; flex: 1; }
.nav-label {
  font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.3);
  letter-spacing: 1.5px; padding: 8px 20px 4px; text-transform: uppercase;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px; font-size: 12px; color: rgba(255,255,255,0.55);
  cursor: pointer; transition: all 0.15s; border-left: 2px solid transparent;
}
.nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
.nav-item.active { color: #fff; border-left-color: var(--accent); background: rgba(59,130,246,0.12); }
.nav-item .ico { font-size: 15px; width: 18px; text-align: center; }
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.07);
  font-size: 10px; color: rgba(255,255,255,0.3);
}
.sidebar-footer .name { color: rgba(255,255,255,0.7); font-weight: 500; font-size: 11px; }

.main { flex: 1; padding: 28px 32px; overflow-x: hidden; }
.page { display: none; width: 100%; }
.page.active { display: block; }

/* ── TOP BAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.topbar h1 { font-size: 18px; font-weight: 700; color: var(--text); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.date-chip {
  font-family: var(--mono); font-size: 11px; color: var(--text2);
  background: var(--surface); border: 1px solid var(--border);
  padding: 5px 12px; border-radius: 20px;
}
.btn-primary {
  background: var(--navy); color: #fff;
  font-size: 11px; font-weight: 500; padding: 6px 14px;
  border-radius: var(--radius-sm); border: none; cursor: pointer;
  transition: background 0.15s;
}
.btn-primary:hover { background: var(--navy2); }
.btn-export {
  background: var(--green); color: #fff;
  font-size: 11px; font-weight: 500; padding: 6px 14px;
  border-radius: var(--radius-sm); border: none; cursor: pointer;
}
.btn-export:hover { opacity: 0.9; }

/* ── SECTIONS ── */
.section-title {
  font-size: 11px; font-weight: 700; color: var(--text3);
  letter-spacing: 1.2px; text-transform: uppercase;
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.section-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border2);
}

/* ── KPI CARDS ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr); /* 6개에서 5개 항목으로 그리드 조정 */
  gap: 10px; margin-bottom: 28px;
}
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 14px;
  position: relative; overflow: hidden;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.kpi-card.blue::before { background: var(--accent); }
.kpi-card.green::before { background: var(--green); }
.kpi-card.red::before { background: var(--red); }
.kpi-card.amber::before { background: var(--amber); }
.kpi-card.purple::before { background: var(--purple); }
.kpi-card.navy::before { background: var(--navy); }
.kpi-label {
  font-size: 10px; color: var(--text3); margin-bottom: 8px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.kpi-value { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1; margin-bottom: 6px; font-family: var(--mono); }
.kpi-value span { font-size: 13px; font-weight: 400; }
.kpi-trend { font-size: 10px; font-weight: 500; }
.up { color: var(--green); } .down { color: var(--red); } .neu { color: var(--text3); }

  display: grid; grid
