<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="드림솔 시설관리">
<meta name="theme-color" content="#0f1c3f">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230f1c3f' width='100' height='100'/><text y='70' x='50' text-anchor='middle' font-size='60' fill='%23fff'>🏢</text></svg>">
<title>드림솔 시설관리 통합 대시보드 v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --navy: #0f1c3f;
  --navy2: #1a2e5a;
  --navy3: #253d72;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --green: #10b981;
  --amber: #f59e0b;
  --red: #ef4444;
  --purple: #8b5cf6;
  --bg: #f0f4fa;
  --surface: #ffffff;
  --surface2: #f8fafd;
  --border: rgba(15,28,63,0.1);
  --border2: rgba(15,28,63,0.06);
  --text: #0f1c3f;
  --text2: #4a5a7a;
  --text3: #8899bb;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── LAYOUT ── */
.shell { display: flex; min-height: 100vh; }
.sidebar {
  width: 220px; min-height: 100vh;
  background: var(--navy);
  padding: 0;
  flex-shrink: 0;
  display: flex; flex-direction: column;
}
.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.sidebar-logo .co { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
.sidebar-logo .sub { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.sidebar-logo .badge {
  display: inline-block; margin-top: 8px;
  background: var(--accent); color: #fff;
  font-size: 9px; font-weight: 700; padding: 2px 8px;
  border-radius: 20px; letter-spacing: 0.5px;
}
.nav { padding: 16px 0; flex: 1; }
.nav-label {
  font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.3);
  letter-spacing: 1.5px; padding: 8px 20px 4px; text-transform: uppercase;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px; font-size: 12px; color: rgba(255,255,255,0.55);
  cursor: pointer; transition: all 0.15s; border-left: 2px solid transparent;
}
.nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
.nav-item.active { color: #fff; border-left-color: var(--accent); background: rgba(59,130,246,0.12); }
.nav-item .ico { font-size: 15px; width: 18px; text-align: center; }
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.07);
  font-size: 10px; color: rgba(255,255,255,0.3);
}
.sidebar-footer .name { color: rgba(255,255,255,0.7); font-weight: 500; font-size: 11px; }

.main { flex: 1; padding: 28px 32px; overflow-x: hidden; }
.page { display: none; width: 100%; }
.page.active { display: block; }

/* ── TOP BAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.topbar h1 { font-size: 18px; font-weight: 700; color: var(--text); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.date-chip {
  font-family: var(--mono); font-size: 11px; color: var(--text2);
  background: var(--surface); border: 1px solid var(--border);
  padding: 5px 12px; border-radius: 20px;
}
.btn-primary {
  background: var(--navy); color: #fff;
  font-size: 11px; font-weight: 500; padding: 6px 14px;
  border-radius: var(--radius-sm); border: none; cursor: pointer;
  transition: background 0.15s;
}
.btn-primary:hover { background: var(--navy2); }
.btn-export {
  background: var(--green); color: #fff;
  font-size: 11px; font-weight: 500; padding: 6px 14px;
  border-radius: var(--radius-sm); border: none; cursor: pointer;
}
.btn-export:hover { opacity: 0.9; }

/* ── SECTIONS ── */
.section-title {
  font-size: 11px; font-weight: 700; color: var(--text3);
  letter-spacing: 1.2px; text-transform: uppercase;
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.section-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border2);
}

/* ── KPI CARDS ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px; margin-bottom: 28px;
}
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 14px;
  position: relative; overflow: hidden;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.kpi-card.blue::before { background: var(--accent); }
.kpi-card.green::before { background: var(--green); }
.kpi-card.red::before { background: var(--red); }
.kpi-card.amber::before { background: var(--amber); }
.kpi-card.purple::before { background: var(--purple); }
.kpi-card.navy::before { background: var(--navy); }
.kpi-label {
  font-size: 10px; color: var(--text3); margin-bottom: 8px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.kpi-value { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1; margin-bottom: 6px; font-family: var(--mono); }
.kpi-value span { font-size: 13px; font-weight: 400; }
.kpi-trend { font-size: 10px; font-weight: 500; }
.up { color: var(--green); } .down { color: var(--red); } .neu { color: var(--text3); }

/* ── DDAY ── */
.dday-strip {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 8px; margin-bottom: 28px;
}
.dday-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px;
  cursor: pointer; transition: box-shadow 0.15s;
}
.dday-card:hover { box-shadow: 0 2px 12px rgba(15,28,63,0.08); }
.dday-card .dd-name { font-size: 10px; color: var(--text3); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dday-card .dd-num { font-family: var(--mono); font-size: 20px; font-weight: 700; }
.dday-card .dd-date { font-size: 10px; color: var(--text3); margin-top: 3px; }
.dday-safe .dd-num { color: var(--text2); }
.dday-warn { background: #fffbea; border-color: #f5c842; }
.dday-warn .dd-num { color: #92650a; }
.dday-urgent { background: #fff1f1; border-color: #fca5a5; }
.dday-urgent .dd-num { color: var(--red); animation: blink 1s step-end infinite; }
.dday-over { background: #1a1a2e; border-color: #7f1d1d; }
.dday-over .dd-num { color: #fc8181; }
.dday-over .dd-name, .dday-over .dd-date { color: #6b7280; }
.dday-completed { background: #ecfdf5; border-color: var(--green); }
.dday-completed .dd-num { color: var(--green); text-decoration: line-through; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.dday-add-btn {
  background: var(--surface); border: 1px dashed var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-size: 11px; color: var(--text3); cursor: pointer;
  transition: all 0.15s;
}
.dday-add-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── CHARTS ROW ── */
.charts-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 28px; }
.chart-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.chart-card .ct { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 12px; }
.chart-legend { display: flex; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
.chart-legend .leg { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text3); }
.chart-legend .dot { width: 8px; height: 8px; border-radius: 2px; }
.ring-wrap { display: flex; align-items: center; justify-content: center; padding: 8px 0; }
.ring-stats { margin-left: 14px; }
.ring-stats .rs { margin-bottom: 8px; }
.ring-stats .rs .rl { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
.ring-stats .rs .rv { font-size: 16px; font-weight: 700; color: var(--text); font-family: var(--mono); }

/* ── TASK TABLE ── */
.table-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 14px; overflow: hidden;
}
.table-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border2);
}
.table-header .th { font-size: 12px; font-weight: 700; color: var(--text); }
.filter-pills { display: flex; gap: 6px; }
.pill {
  font-size: 10px; padding: 4px 12px; border-radius: 20px; cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--text3);
  transition: all 0.15s;
}
.pill.active { background: var(--navy); color: #fff; border-color: var(--navy); }
.pill:hover:not(.active) { border-color: var(--text3); color: var(--text2); }
table { width: 100%; border-collapse: collapse; }
th {
  font-size: 10px; font-weight: 700; color: var(--text3);
  letter-spacing: 0.8px; text-transform: uppercase;
  padding: 8px 18px; text-align: left;
  background: var(--surface2); border-bottom: 1px solid var(--border2);
}
td { padding: 10px 18px; font-size: 12px; color: var(--text); border-bottom: 1px solid var(--border2); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 10px; font-weight: 500; cursor: pointer; transition: opacity 0.15s;
}
.badge:hover { opacity: 0.75; }
.b-todo { background: #fff1f1; color: #b91c1c; border: 1px solid #fca5a5; }
.b-wip { background: #fffbea; color: #92400e; border: 1px solid #fcd34d; }
.b-done { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
.b-complete { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
.b-incomplete { background: #fff1f1; color: #b91c1c; border: 1px solid #fca5a5; }
.type-chip {
  display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px;
}
.tc-complaint { background: #ede9fe; color: #5b21b6; }
.tc-facility { background: #e0f2fe; color: #075985; }
.tc-inspect { background: #fef3c7; color: #92400e; }
.tc-construction { background: #f0fdf4; color: #166534; }
.add-row-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 18px; font-size: 11px; color: var(--text3);
  cursor: pointer; border-top: 1px dashed var(--border2);
  background: var(--surface2); transition: color 0.15s;
}
.add-row-btn:hover { color: var(--accent); }
.done-toggle-btn {
  font-size: 11px; color: var(--text3); cursor: pointer;
  padding: 8px 18px; display: inline-flex; align-items: center; gap: 5px;
}
.done-toggle-btn:hover { color: var(--accent); }

/* ── COST TABLE ── */
.cost-save-val { color: var(--green); font-weight: 700; font-family: var(--mono); font-size: 12px; }

/* ── MODAL FORM ── */
.modal-backdrop {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.45); align-items: center; justify-content: center;
}
.modal-backdrop.show { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius);
  padding: 24px; width: 480px; max-width: 95vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  max-height: 90vh; overflow-y: auto;
}
.modal h3 { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-grid.one { grid-template-columns: 1fr; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
.form-group input, .form-group select, .form-group textarea {
  font-family: var(--sans); font-size: 12px; color: var(--text);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 12px; outline: none;
  transition: border-color 0.15s;
}
.form-group input:focus, .form-group select:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.btn-cancel {
  font-size: 12px; padding: 7px 16px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: transparent; cursor: pointer;
  color: var(--text2);
}
.btn-save {
  font-size: 12px; padding: 7px 18px; border-radius: var(--radius-sm);
  background: var(--accent); border: none; color: #fff; cursor: pointer; font-weight: 500;
}

/* ── BOTTOM STATS ── */
.bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 14px; }

/* ── VENDOR TABLE ── */
.star { color: var(--amber); font-size: 12px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
  background: var(--navy); color: #fff; font-size: 12px;
  padding: 10px 18px; border-radius: var(--radius-sm);
  opacity: 0; transform: translateY(8px); transition: all 0.25s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

/* ── ALERT CARD ── */
.alert-card {
  background: #fff1f1; border: 1px solid #fca5a5; border-radius: var(--radius);
  padding: 12px 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px;
}
.alert-card .icon { font-size: 20px; color: var(--red); }
.alert-card .content { flex: 1; }
.alert-card .title { font-size: 12px; font-weight: 700; color: var(--red); margin-bottom: 2px; }
.alert-card .desc { font-size: 11px; color: #7f1d1d; }

@media (max-width: 1200px) {
  .kpi-grid { grid-template-columns: repeat(3, 1fr); }
  .charts-row { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 900px) {
  .sidebar { display: none; }
  .main { padding: 16px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .charts-row { grid-template-columns: 1fr; }
  .bottom-row { grid-template-columns: 1fr; }
}

/* ── LOGIN SCREEN ── */
.login-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  display: flex; align-items: center; justify-content: center;
}
.login-screen.hide { display: none; }
.login-box {
  background: var(--surface); border-radius: var(--radius);
  padding: 48px 40px; width: 400px; max-width: 90vw;
  box-shadow: 0 25px 80px rgba(0,0,0,0.4);
}
.login-logo { text-align: center; margin-bottom: 36px; }
.login-logo .icon { font-size: 48px; margin-bottom: 16px; }
.login-logo .co { font-size: 26
