<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>드림솔 시설관리 통합 대시보드 v2</title>
<style>
/* 기존 스타일은 그대로 유지하고 아래 스타일만 추가/변경합니다 */
.dday-over { background: #fff5f5; border-color: #feb2b2; }
.dday-over .dd-num { color: #e53e3e; font-weight: 700; }
.dday-over .dd-name { color: #9b2c2c; font-weight: 500; }
.dday-over .dd-date { color: #e53e3e; }
</style>
</head>
<body>
<script>
/* ── [핵심 수정] 법정점검 렌더링 함수 ── */
function renderDday() {
  const strip = document.getElementById('dday-strip');
  strip.innerHTML = '';
  
  // 1. 완료(completed: true)되지 않은 항목만 필터링
  const activeDdays = ddays.filter(d => !d.completed);
  
  activeDdays.slice(0, 5).forEach(d => {
    const diff = diffDays(d.date);
    let label = `D-${diff}`, cls = 'dday-safe';
    
    // 2. 기한 초과(음수) 시 붉은색 스타일(dday-over) 적용
    if (diff < 0) { 
        label = `기한초과 ${Math.abs(diff)}일`; 
        cls = 'dday-over'; 
    } else if (diff === 0) { 
        label = 'D-Day'; 
        cls = 'dday-urgent'; 
    } else if (diff <= 7) { 
        label = `D-${diff}`; 
        cls = 'dday-urgent'; 
    } else if (diff <= 30) { 
        label = `D-${diff}`; 
        cls = 'dday-warn'; 
    }

    const card = document.createElement('div');
    card.className = `dday-card ${cls}`;
    card.onclick = () => navigateTo('dday');
    card.innerHTML = `
      <div class="dd-name">${d.name}</div>
      <div class="dd-num">${label}</div>
      <div class="dd-date">${d.date}</div>
    `;
    strip.appendChild(card);
  });

  // 점검 추가 버튼은 항상 표시
  const btn = document.createElement('div');
  btn.className = 'dday-add-btn';
  btn.onclick = () => showModal('dday');
  btn.innerHTML = '＋ 점검 추가';
  strip.appendChild(btn);
}

// 나머지 모든 함수 및 데이터 로직은 기존과 동일하게 유지...
</script>
</body>
</html>
